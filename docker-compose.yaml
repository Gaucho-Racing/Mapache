name: mapache

services:
  kerbecs:
    container_name: mapache-kerbecs
    image: bk1031/kerbecs:latest
    restart: unless-stopped
    ports:
      - "10310:10310"
      - "10300:10300"
    volumes:
      - ./kerbecs.yaml:/etc/kerbecs/kerbecs.yaml:ro
    environment:
      ENV: "DEV"
      KERBECS_CONFIG: /etc/kerbecs/kerbecs.yaml
      KERBECS_USER: "admin"
      KERBECS_PASSWORD: "admin"
    depends_on:
      - auth
      - vehicle
      - gr26
      - query
      - dashboard

  auth:
    container_name: mapache-auth
    build:
      context: .
      dockerfile: auth/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "7002:7002"
    volumes:
      - ./auth:/app/auth
      - auth_go_cache:/go
    environment:
      ENV: "DEV"
      PORT: "7002"
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      KERBECS_ENDPOINT: "http://kerbecs:10300"
      KERBECS_USER: "admin"
      KERBECS_PASSWORD: "admin"
      SENTINEL_URL: ${SENTINEL_URL}
      SENTINEL_JWKS_URL: ${SENTINEL_JWKS_URL}
      SENTINEL_CLIENT_ID: ${SENTINEL_CLIENT_ID}
      SENTINEL_CLIENT_SECRET: ${SENTINEL_CLIENT_SECRET}
      SENTINEL_TOKEN: ${SENTINEL_TOKEN}
      SENTINEL_REDIRECT_URI: ${SENTINEL_REDIRECT_URI}
      SKIP_AUTH_CHECK: "true"

  vehicle:
    container_name: mapache-vehicle
    build:
      context: .
      dockerfile: vehicle/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "7003:7003"
    volumes:
      - ./vehicle:/app/vehicle
      - ./mapache-go:/app/mapache-go
      - vehicle_go_cache:/go
    environment:
      ENV: "DEV"
      PORT: "7003"
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      KERBECS_ENDPOINT: "http://kerbecs:10300"
      KERBECS_USER: "admin"
      KERBECS_PASSWORD: "admin"

  gr26:
    container_name: mapache-gr26
    build:
      context: .
      dockerfile: gr26/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - nanomq
    ports:
      - "7005:7005"
    volumes:
      - ./gr26:/app/gr26
      - ./mapache-go:/app/mapache-go
      - gr26_go_cache:/go
    environment:
      ENV: "DEV"
      PORT: "7005"
      MQTT_HOST: "nanomq"
      MQTT_PORT: "1883"
      MQTT_USER: "gr26"
      MQTT_PASSWORD: "gr26"
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      KERBECS_ENDPOINT: "http://kerbecs:10300"
      KERBECS_USER: "admin"
      KERBECS_PASSWORD: "admin"
      SKIP_AUTH_CHECK: "true"

  query:
    container_name: mapache-query
    build:
      context: .
      dockerfile: query/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "7010:7010"
    volumes:
      - ./query:/app/query
    environment:
      ENV: "DEV"
      PORT: "7010"
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      KERBECS_ENDPOINT: "http://kerbecs:10300"
      KERBECS_USER: "admin"
      KERBECS_PASSWORD: "admin"
      SENTINEL_URL: ${SENTINEL_URL}
      SENTINEL_JWKS_URL: ${SENTINEL_JWKS_URL}
      SENTINEL_CLIENT_ID: ${SENTINEL_CLIENT_ID}
      SKIP_AUTH_CHECK: "true"

  dashboard:
    container_name: mapache-dashboard
    build:
      context: .
      dockerfile: dashboard/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app/dashboard
      - dashboard_node_modules:/app/dashboard/node_modules
    environment:
      VITE_BACKEND_URL: "http://localhost:10310"
      VITE_BACKEND_WS_URL: "ws://localhost:10310"
      VITE_SENTINEL_CLIENT_ID: ${SENTINEL_CLIENT_ID:-z6V9NREjMFhf}
      VITE_MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      VITE_SKIP_AUTH_CHECK: "true"

  nanomq:
    container_name: mapache-nanomq
    image: emqx/nanomq:latest
    restart: unless-stopped
    ports:
      - "1883:1883"

  db:
    container_name: mapache-db
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      # Mount the parent dir, not /var/lib/postgresql/data — pg18+ writes to
      # a version-specific subdir (e.g. /var/lib/postgresql/18/docker).
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
  auth_go_cache:
  vehicle_go_cache:
  gr26_go_cache:
  dashboard_node_modules:
