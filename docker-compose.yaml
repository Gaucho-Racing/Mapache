  nanomq:
    image: emqx/nanomq:latest
    restart: unless-stopped
    ports:
      - "1883:1883"

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  auth_go_cache:
  vehicle_go_cache: