name: mapache

services:
  kerbecs:
    image: bk1031/kerbecs:latest
    container_name: kerbecs
    restart: unless-stopped
    depends_on:
      - rincon
    environment:
      PORT: "10310"
      ADMIN_PORT: "10300"
      KERBECS_USER: "admin"
      KERBECS_PASSWORD: "admin"
      KERBECS_ENDPOINT: "http://kerbecs:10300"
      KERBECS_HEALTH_CHECK: "http://kerbecs:10300/admin-gw/ping"
      RINCON_USER: "admin"
      RINCON_PASSWORD: "admin"
      RINCON_ENDPOINT: "http://rincon:10311"
    ports:
      - "10310:10310"
      - "10300:10300"

  rincon:
    image: bk1031/rincon:latest
    container_name: rincon
    restart: unless-stopped
    environment:
      PORT: "10311"
      AUTH_USER: "admin"
      AUTH_PASSWORD: "admin"
      SELF_ENDPOINT: "http://rincon:10311"
      SELF_HEALTH_CHECK: "http://rincon:10311/rincon/ping"
      STORAGE_MODE: "local"
      OVERWRITE_ROUTES: "true"
      HEARTBEAT_TYPE: "server"
      HEARTBEAT_INTERVAL: "10"
    ports:
      - "10311:10311"

  auth:
    build:
      context: .
      dockerfile: auth/Dockerfile.dev
    container_name: auth
    restart: unless-stopped
    depends_on:
      - rincon
    ports:
      - "7002:7002"
    volumes:
      - ./auth:/app/auth
      - auth_go_cache:/go
    environment:
      ENV: "DEV"
      PORT: "7002"
      SERVICE_ENDPOINT: "http://auth:7002"
      SERVICE_HEALTH_CHECK: "http://auth:7002/auth/ping"
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      RINCON_USER: "admin"
      RINCON_PASSWORD: "admin"
      RINCON_ENDPOINT: "http://rincon:10311"
      SENTINEL_URL: ${SENTINEL_URL}
      SENTINEL_JWKS_URL: ${SENTINEL_JWKS_URL}
      SENTINEL_CLIENT_ID: ${SENTINEL_CLIENT_ID}
      SENTINEL_CLIENT_SECRET: ${SENTINEL_CLIENT_SECRET}
      SENTINEL_TOKEN: ${SENTINEL_TOKEN}
      SENTINEL_REDIRECT_URI: ${SENTINEL_REDIRECT_URI}

  vehicle:
    build:
      context: .
      dockerfile: vehicle/Dockerfile.dev
    container_name: vehicle
    restart: unless-stopped
    depends_on:
      - rincon
    ports:
      - "7003:7003"
    volumes:
      - ./vehicle:/app/vehicle
      - ./mapache-go:/app/mapache-go
      - vehicle_go_cache:/go
    environment:
      ENV: "DEV"
      PORT: "7003"
      SERVICE_ENDPOINT: "http://vehicle:7003"
      SERVICE_HEALTH_CHECK: "http://vehicle:7003/vehicle/ping"
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      RINCON_USER: "admin"
      RINCON_PASSWORD: "admin"
      RINCON_ENDPOINT: "http://rincon:10311"

