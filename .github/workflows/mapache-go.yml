name: mapache-go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "mapache-go/**"

defaults:
  run:
    working-directory: mapache-go

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test
        run: go test ./... -v
