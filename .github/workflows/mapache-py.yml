name: mapache-py

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "mapache-py/**"

defaults:
  run:
    working-directory: mapache-py

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff format --check src/
          ruff check src/

      - name: Type check
        run: mypy src/
