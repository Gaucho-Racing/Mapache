apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vehicle
  template:
    metadata:
      labels:
        app: vehicle
    spec:
      containers:
        - name: vehicle
          image: gauchoracing/mp_vehicle:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /vehicle/ping
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /vehicle/ping
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          env:
            - name: PORT
              value: "8080"
            - name: SERVICE_ENDPOINT
              value: "http://vehicle:8080"
            - name: SERVICE_HEALTH_CHECK
              value: "http://vehicle:8080/vehicle/ping"
            - name: RINCON_USER
              value: "admin"
            - name: RINCON_PASSWORD
              value: "admin"
            - name: RINCON_ENDPOINT
              value: "http://rincon:10311"
          envFrom:
            - configMapRef:
                name: db-config
            - configMapRef:
                name: sentinel-config
